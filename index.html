<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SmartBot Final Edition</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #1a1a1a; color: white; font-family: sans-serif; }
        #sidebar { width: 250px; background: #111; padding: 20px; border-left: 1px solid #333; }
        #chat-main { flex: 1; display: flex; flex-direction: column; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; }
        .row { padding: 15px; border-bottom: 1px solid #333; position: relative; }
        .actions { display: inline-flex; gap: 10px; margin-right: 10px; opacity: 0.5; }
        #input-zone { padding: 20px; background: #212121; display: flex; gap: 10px; }
        textarea { flex: 1; background: #40414f; border: none; padding: 10px; color: white; border-radius: 5px; resize: none; }
        button { padding: 10px 20px; background: #4caf50; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 ondblclick="showAdmin()">SmartBot 🚀</h3>
    <div id="history"></div>
    <button onclick="location.reload()">שיחה חדשה</button>
</div>

<div id="chat-main">
    <div id="chat-container"></div>
    <div id="input-zone">
        <textarea id="user-input" rows="1"></textarea>
        <button onclick="handleSend()">שלח</button>
    </div>
</div>

<script>
    // --- 1. הגדרות בסיס ---
    const firebaseConfig = { /* הכנס נתונים מ-Firebase כאן */ };
    firebase.initializeApp(firebaseConfig);
    let GROQ_API_KEY = "הכנס_כאן_את_המפתח_שלך";

    // --- 2. פונקציית שליחה חכמה (טקסט + מדיה) ---
    async function handleSend() {
        const input = document.getElementById("user-input");
        const text = input.value.trim();
        if(!text) return;
        
        appendRow(text, "user");
        input.value = "";

        const isMusic = /מוזיקה|שיר|תלחין/.test(text);
        const isVideo = /סרטון|וידאו|סרט/.test(text);
        const isImage = /תמונה|צייר|תצייר|תיצור/.test(text);

        if (isMusic || isVideo || isImage) {
            const prompt = text.replace(/(תמונה|צייר|תצייר|תיצור|סרטון|וידאו|סרט|מוזיקה|שיר|תלחין|לי|את)/gi, "").trim();
            const enc = encodeURIComponent(prompt || "abstract");
            const url = isMusic ? `https://pollinations.ai/music/${enc}` : 
                        isVideo ? `https://image.pollinations.ai/p/${enc}?model=turbo` : 
                        `https://image.pollinations.ai/p/${enc}?nologo=true`;
            
            appendRow(`מייצר עבורך...`, "bot", isMusic ? "music" : (isVideo ? "video" : "image"), url);
        } else {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {"Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json"},
                body: JSON.stringify({model: "llama-3.3-70b-versatile", messages: [{role: "user", content: text}]})
            });
            const data = await res.json();
            appendRow(data.choices[0].message.content, "bot");
        }
    }

    // --- 3. פונקציית תצוגה ועריכה ---
    function appendRow(text, role, type=null, url=null) {
        const chat = document.getElementById("chat-container");
        const div = document.createElement("div");
        div.className = `row ${role}`;
        div.innerHTML = `<div>${text}</div>` + 
            (role === 'user' ? `<div class="actions"><span onclick="edit(this)">📝</span><span onclick="this.parentElement.parentElement.remove()">🗑️</span></div>` : '');
        
        if(type === "image" || type === "video") div.innerHTML += `<img src="${url}" style="max-width:300px; display:block; margin-top:10px;">`;
        if(type === "music") div.innerHTML += `<audio controls src="${url}" style="margin-top:10px;"></audio>`;
        
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function edit(el) { document.getElementById("user-input").value = el.parentElement.parentElement.innerText.replace('📝🗑️', ''); }
    function showAdmin() { GROQ_API_KEY = prompt("הכנס API Key חדש:", GROQ_API_KEY); }
</script>
</body>
</html>
