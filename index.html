<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBot 🚀</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --chat-bg: #212121;
            --sidebar-bg: #171717;
            --text-color: #ececec;
            --user-msg: #2f303d;
            --bot-msg: #212121;
            --accent-color: #4caf50;
            --btn-hover: #3e3f4b;
            --icon-color: #acacbe;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* סרגל צד - היסטוריית שיחות */
        #sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #333;
            box-sizing: border-box;
        }

        #new-chat-btn {
            background-color: transparent;
            color: white;
            border: 1px solid #444;
            border-radius: 5px;
            padding: 12px;
            text-align: right;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            transition: background 0.2s;
        }

        #new-chat-btn:hover {
            background-color: var(--btn-hover);
        }

        #history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .history-item {
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.9rem;
            color: #ccc;
            transition: background 0.2s, color 0.2s;
        }

        .history-item:hover, .history-item.active {
            background-color: var(--btn-hover);
            color: white;
        }

        /* אזור הצ'אט הראשי */
        #main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--chat-bg);
            position: relative;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            border-bottom: 1px solid #333;
            cursor: pointer;
            user-select: none;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 100px; /* מרווח בשביל תיבת הקלט למטה */
        }

        .message-row {
            display: flex;
            padding: 20px 25px;
            gap: 15px;
            width: 100%;
            box-sizing: border-box;
            border-bottom: 1px solid #333;
            position: relative;
        }

        .message-row.user {
            background-color: var(--user-msg);
        }

        .message-row.bot {
            background-color: var(--bot-msg);
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .message-row.user .avatar {
            background-color: #543a3a;
            color: white;
        }

        .message-row.bot .avatar {
            background-color: var(--accent-color);
            color: white;
        }

        .message-content {
            flex: 1;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        /* כפתורי העתקה ועריכה שמופיעים במעבר עכבר */
        .message-actions {
            display: none;
            position: absolute;
            left: 15px;
            bottom: 5px;
            gap: 8px;
            background-color: rgba(33, 33, 33, 0.9);
            padding: 4px 8px;
            border-radius: 5px;
            border: 1px solid #444;
        }

        .message-row:hover .message-actions {
            display: flex;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--icon-color);
            cursor: pointer;
            padding: 2px;
            font-size: 0.9rem;
            border-radius: 3px;
        }

        .action-btn:hover {
            color: white;
        }

        /* אנימציית טעינה של 4 נקודות מסתובבות/מהבהבות */
        .dots-loader {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 10px 0;
        }

        .dots-loader span {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
            animation: dots-flash 1.2s infinite ease-in-out both;
        }

        .dots-loader span:nth-child(1) { animation-delay: -0.36s; }
        .dots-loader span:nth-child(2) { animation-delay: -0.24s; }
        .dots-loader span:nth-child(3) { animation-delay: -0.12s; }
        .dots-loader span:nth-child(4) { animation-delay: 0s; }

        @keyframes dots-flash {
            0%, 80%, 100% { transform: scale(0.3); opacity: 0.3; }
            40% { transform: scale(1.1); opacity: 1; }
        }

        /* אזור הקלט בתחתית המסך */
        #input-container {
            background-color: linear-gradient(transparent, var(--chat-bg));
            padding: 20px;
            position: absolute;
            bottom: 0;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
        }
        
        #input-wrapper {
            width: 85%;
            max-width: 800px;
            background-color: #40414f;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            padding: 8px 15px;
            gap: 10px;
        }

        textarea {
            flex: 1;
            padding: 5px;
            border: none;
            background-color: transparent;
            color: white;
            font-size: 1rem;
            outline: none;
            resize: none;
            max-height: 120px;
            font-family: inherit;
        }

        #send-btn {
            background-color: transparent;
            color: var(--icon-color);
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            transition: color 0.2s;
        }

        #send-btn:hover:not(:disabled) {
            color: var(--accent-color);
        }
        
        #send-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        /* פאנל ניהול סודי */
        #admin-panel {
            display: none;
            position: fixed;
            top: 0;
            right: 260px;
            width: 320px;
            height: 100vh;
            background-color: #222;
            border-left: 2px solid #444;
            box-shadow: -5px 0 25px rgba(0,0,0,0.7);
            padding: 25px;
            box-sizing: border-box;
            z-index: 1000;
        }
        #admin-panel h3 { margin-top: 0; border-bottom: 2px solid #444; padding-bottom: 10px; color: var(--accent-color); }
        .admin-group { margin-bottom: 20px; }
        .admin-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #ccc; }
        #admin-panel input { width: 100%; border-radius: 8px; padding: 10px; background-color: #333; border: 1px solid #555; color: white; box-sizing: border-box; }
        .admin-btn { width: 100%; background-color: var(--accent-color); border-radius: 8px; margin-top: 5px; color: white; font-weight: bold; padding: 10px; border: none; cursor: pointer;}
        #close-admin { background-color: #555 !important; margin-top: 15px; }
    </style>
</head>
<body>

    <!-- סרגל צד (היסטוריית שיחות) -->
    <div id="sidebar">
        <button id="new-chat-btn" onclick="startNewChat()">
            שיחה חדשה <span>+</span>
        </button>
        <div id="history-list"></div>
    </div>

    <!-- אזור הצ'אט הראשי -->
    <div id="main-chat">
        <header id="header-title" title="לחץ לחיצה כפולה להגדרות">SmartBot 🚀</header>

        <div id="chat-container">
            <!-- הודעות ייטענו כאן דינמית -->
        </div>

        <div id="input-container">
            <div id="input-wrapper">
                <textarea id="user-input" placeholder="שלח הודעה ל-SmartBot..." rows="1" oninput="adjustTextareaHeight(this)" onkeypress="handleKeyPress(event)"></textarea>
                <button id="send-btn" onclick="sendMessage()" disabled>&#10148;</button>
            </div>
        </div>
    </div>

    <!-- פאנל ניהול סודי -->
    <div id="admin-panel">
        <h3>🔑 הגדרות ניהול SmartBot</h3>
        <div class="admin-group"><label>מפתח Groq API:</label><input type="text" id="api-key-input" placeholder="gsk_..."></div>
        <div class="admin-group"><label>שם האתר:</label><input type="text" id="site-name-input"></div>
        <div class="admin-group"><label>סיסמת אדמין:</label><input type="password" id="admin-pass-input"></div>
        <button class="admin-btn" onclick="saveAdminSettings()">שמור שינויים</button>
        <button id="close-admin" class="admin-btn" onclick="toggleAdminPanel()">סגור</button>
    </div>

    <script>
        // --- אתחול משתנים והגדרות ---
        let apiKey = localStorage.getItem("groq_api_key") || "";
        let siteName = localStorage.getItem("groq_site_name") || "SmartBot 🚀";
        let adminPassword = localStorage.getItem("groq_admin_pass") || "1234";
        
        // תיקון התנגשות הנתונים הישנים: אם המבנה ישן, ננקה אותו
        let conversations;
        try {
            conversations = JSON.parse(localStorage.getItem("groq_conversations")) || {};
            if (typeof conversations !== 'object' || Array.isArray(conversations)) { conversations = {}; }
        } catch(e) {
            conversations = {};
        }

        let currentConversationId = null;
        let isWaitingForBot = false;
        let editingMessageIndex = null;

        // עדכון כותרות בשנייה הראשונה
        document.getElementById("header-title").innerText = siteName;
        document.title = siteName;

        // הדפסה ראשונית של היסטוריה ופתיחת שיחה אוטומטית
        initApp();

        function initApp() {
            const keys = Object.keys(conversations);
            if (keys.length > 0) {
                // אם יש שיחות קודמות, טען את האחרונה שבהן אוטומטית
                const latestId = keys.sort((a, b) => conversations[b].timestamp - conversations[a].timestamp)[0];
                loadConversation(latestId);
            } else {
                // אם האתר ריק לחלוטין, פתח שיחה חדשה ישר על המסך
                startNewChat();
            }
            
            // האזנה לקלט בשביל להדליק/לכבות את כפתור השליחה
            document.getElementById("user-input").addEventListener('input', function() {
                document.getElementById("send-btn").disabled = !this.value.trim() || isWaitingForBot;
            });
        }

        // --- ניהול מערכת השיחות ---

        function renderHistoryList() {
            const listElement = document.getElementById("history-list");
            listElement.innerHTML = "";
            const keys = Object.keys(conversations).sort((a, b) => conversations[b].timestamp - conversations[a].timestamp);
            
            keys.forEach(id => {
                const item = document.createElement("div");
                item.className = `history-item ${id === currentConversationId ? "active" : ""}`;
                item.innerText = conversations[id].title;
                item.onclick = () => loadConversation(id);
                listElement.appendChild(item);
            });
        }

        function startNewChat() {
            currentConversationId = null;
            editingMessageIndex = null;
            document.getElementById("chat-container").innerHTML = "";
            
            // הצגת הודעת פתיחה ישר במסך
            appendMessageRow("היי! אני SmartBot, העוזר החכם שלך. במה אוכל לעזור לך היום? 😊", "bot");
            renderHistoryList();
            document.getElementById("user-input").value = "";
            document.getElementById("user-input").focus();
        }

        function loadConversation(id) {
            currentConversationId = id;
            editingMessageIndex = null;
            document.getElementById("chat-container").innerHTML = "";
            
            if (conversations[id] && conversations[id].messages) {
                conversations[id].messages.forEach((msg, index) => {
                    appendMessageRow(msg.content, msg.role, index);
                });
            }
            renderHistoryList();
        }

        // --- שליחה וקבלת הודעות מה-AI ---

        async function sendMessage() {
            const inputElement = document.getElementById("user-input");
            let userMessage = inputElement.value.trim();
            if (!userMessage || isWaitingForBot) return;

            if (!apiKey) { 
                alert("מפתח ה-API חסר! אנא בצע לחיצה כפולה על כותרת האתר למעלה, הזן את הסיסמה (1234) והגדר מפתח Groq."); 
                return; 
            }

            // טיפול במצב עריכת הודעה
            if (editingMessageIndex !== null) {
                const editingIndex = editingMessageIndex;
                editingMessageIndex = null;
                // חיתוך ההיסטוריה עד להודעה שנערכה
                conversations[currentConversationId].messages = conversations[currentConversationId].messages.slice(0, editingIndex);
                loadConversation(currentConversationId);
            }

            // יצירת מזהה שיחה במידה ומדובר בשיחה חדשה לחלוטין
            if (!currentConversationId) {
                currentConversationId = "conv_" + Date.now();
                conversations[currentConversationId] = {
                    title: userMessage.split(' ').slice(0, 4).join(' ') + "...",
                    timestamp: Date.now(),
                    messages: []
                };
                document.getElementById("chat-container").innerHTML = ""; // ניקוי הודעת הפתיחה הכללית
            }

            // שמירת הודעת המשתמש בקוד ובמסך
            const messageIndex = conversations[currentConversationId].messages.length;
            conversations[currentConversationId].messages.push({ role: "user", content: userMessage });
            appendMessageRow(userMessage, "user", messageIndex);

            // שמירה זמנית בדפדפן
            conversations[currentConversationId].timestamp = Date.now();
            localStorage.setItem("groq_conversations", JSON.stringify(conversations));
            renderHistoryList();

            // ניקוי תיבת הטקסט
            inputElement.value = "";
            adjustTextareaHeight(inputElement);
            document.getElementById("send-btn").disabled = true;

            // הפעלת אנימציית הטעינה של 4 הנקודות
            isWaitingForBot = true;
            const loadingId = appendLoadingRow();

            try {
                // לקיחת הודעות אחרונות לטובת זיכרון רציף
                const chatHistory = conversations[currentConversationId].messages.slice(-12);
                
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { role: "system", content: "אתה SmartBot, עוזר בינה מלאכותית מתקדם, חכם ובטוח באתר הרשמי של דן. ענה תמיד בעברית טבעית, רהוטה ומושלמת ללא שגיאות כתיב." },
                            ...chatHistory
                        ],
                        temperature: 0.5
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove(); // כיבוי האנימציה
                isWaitingForBot = false;

                if (response.ok) {
                    const botReply = data.choices[0].message.content;
                    const botIndex = conversations[currentConversationId].messages.length;
                    
                    // שמירת תשובת הבוט
                    conversations[currentConversationId].messages.push({ role: "bot", content: botReply });
                    appendMessageRow(botReply, "bot", botIndex);
                    
                    localStorage.setItem("groq_conversations", JSON.stringify(conversations));
                } else {
                    const errorMsg = data.error ? data.error.message : "שגיאה לא ידועה במערכת";
                    appendMessageRow(`❌ שגיאה: ${errorMsg}`, "error");
                }

            } catch (error) {
                if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                isWaitingForBot = false;
                appendMessageRow("❌ תקלה בתקשורת לשרת. ודא שהמפתח תקין ושיש אינטרנט.", "error");
                console.error(error);
            }
        }

        // --- פונקציות העתקה ועריכה ---

        function copyMessage(index) {
            if (currentConversationId && conversations[currentConversationId]) {
                const txt = conversations[currentConversationId].messages[index].content;
                navigator.clipboard.writeText(txt).then(() => {
                    alert("ההודעה הועתקה בהצלחה! 📋");
                });
            }
        }

        function editUserMessage(index) {
            if (isWaitingForBot) return;
            const txt = conversations[currentConversationId].messages[index].content;
            const inputElement = document.getElementById("user-input");
            
            inputElement.value = txt;
            inputElement.focus();
            adjustTextareaHeight(inputElement);
            document.getElementById("send-btn").disabled = false;

            // סימון ויזואלי של ההודעה שנבחרה לעריכה
            cancelEditing();
            editingMessageIndex = index;
            const rows = document.querySelectorAll('.message-row.user');
            if(rows[index]) rows[index].style.borderRight = "4px solid var(--accent-color)";
        }

        function cancelEditing() {
            editingMessageIndex = null;
            document.querySelectorAll('.message-row.user').forEach(row => {
                row.style.borderRight = "none";
            });
        }

        // --- בניית אלמנטים על המסך ---

        function appendMessageRow(text, role, index = null) {
            const chatContainer = document.getElementById("chat-container");
            const row = document.createElement("div");
            row.className = `message-row ${role}`;
            
            const avatar = document.createElement("div");
            avatar.className = "avatar";
            avatar.innerText = role === "user" ? "דן" : "AI";
            row.appendChild(avatar);
            
            const content = document.createElement("div");
            content.className = "message-content";
            content.innerText = text;
            row.appendChild(content);
            
            // יצירת כפתורי צץ-צץ (העתק/ערוך) במעבר עכבר
            if ((role === "user" || role === "bot") && index !== null) {
                const actions = document.createElement("div");
                actions.className = "message-actions";
                
                const copyBtn = document.createElement("button");
                copyBtn.className = "action-btn";
                copyBtn.innerHTML = "📋 העתק";
                copyBtn.onclick = () => copyMessage(index);
                actions.appendChild(copyBtn);
                
                if (role === "user") {
                    const editBtn = document.createElement("button");
                    editBtn.className = "action-btn";
                    editBtn.innerHTML = "📝 ערוך";
                    editBtn.onclick = () => editUserMessage(index);
                    actions.appendChild(editBtn);
                }
                row.appendChild(actions);
            }
            
            chatContainer.appendChild(row);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendLoadingRow() {
            const chatContainer = document.getElementById("chat-container");
            const id = "loader_" + Date.now();
            const row = document.createElement("div");
            row.className = "message-row bot";
            row.id = id;
            
            const avatar = document.createElement("div"); avatar.className = "avatar"; avatar.innerText = "AI";
            row.appendChild(avatar);
            
            const content = document.createElement("div"); content.className = "message-content";
            const loader = document.createElement("div"); loader.className = "dots-loader";
            loader.innerHTML = "<span></span><span></span><span></span><span></span>"; // 4 נקודות
            content.appendChild(loader);
            row.appendChild(content);
            
            chatContainer.appendChild(row);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }

        function adjustTextareaHeight(element) {
            element.style.height = "auto";
            element.style.height = (element.scrollHeight) + "px";
        }

        function handleKeyPress(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // --- לוגיקת פאנל ניהול ---

        document.getElementById("header-title").addEventListener("dblclick", () => {
            const password = prompt("הכנס סיסמת מנהל סודית:");
            if (password === adminPassword) {
                toggleAdminPanel();
                document.getElementById("api-key-input").value = apiKey;
                document.getElementById("site-name-input").value = siteName;
                document.getElementById("admin-pass-input").value = adminPassword;
            } else if (password !== null) { alert("סיסמה שגויה!"); }
        });

        function toggleAdminPanel() {
            const panel = document.getElementById("admin-panel");
            panel.style.display = panel.style.display === "block" ? "none" : "block";
        }

        function saveAdminSettings() {
            const keyInput = document.getElementById("api-key-input").value.trim();
            const nameInput = document.getElementById("site-name-input").value.trim();
            const passInput = document.getElementById("admin-pass-input").value.trim();

            if (keyInput) { localStorage.setItem("groq_api_key", keyInput); apiKey = keyInput; }
            if (nameInput) { localStorage.setItem("groq_site_name", nameInput); siteName = nameInput; document.getElementById("header-title").innerText = siteName; document.title = siteName; }
            if (passInput) { localStorage.setItem("groq_admin_pass", passInput); adminPassword = passInput; }

            alert("השינויים נשמרו בהצלחה!"); 
            toggleAdminPanel();
        }
    </script>
</body>
</html>
