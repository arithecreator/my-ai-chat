<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אתר ה-AI שלי | צ'אט מהיר</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --chat-bg: #2d2d2d;
            --text-color: #ffffff;
            --user-msg: #007acc;
            --bot-msg: #444444;
            --accent-color: #4caf50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 2px solid #333;
            cursor: pointer;
            user-select: none;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user {
            background-color: var(--user-msg);
            align-self: flex-start;
            border-bottom-right-radius: 2px;
        }

        .bot {
            background-color: var(--bot-msg);
            align-self: flex-end;
            border-bottom-left-radius: 2px;
        }

        .error {
            background-color: #d32f2f;
            color: white;
            align-self: center;
            border-radius: 5px;
        }

        #input-container {
            background-color: var(--chat-bg);
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 2px solid #333;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background-color: #444;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background-color: var(--user-msg);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #005999;
        }

        /* פאנל ניהול סודי */
        #admin-panel {
            display: none;
            position: fixed;
            top: 0;
            right: 0;
            width: 300px;
            height: 100vh;
            background-color: #222;
            border-left: 2px solid #444;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            padding: 20px;
            box-sizing: border-box;
            z-index: 1000;
        }

        #admin-panel h3 {
            margin-top: 0;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        #admin-panel input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #555;
            background-color: #333;
            color: white;
            box-sizing: border-box;
        }

        #admin-panel button {
            width: 100%;
            background-color: var(--accent-color);
        }

        #admin-panel button:hover {
            background-color: #388e3c;
        }

        #close-admin {
            background-color: #777 !important;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header id="header-title">🤖 אתר ה-AI שלי | צ'אט מהיר</header>

    <div id="chat-container">
        <div class="message bot">היי! אני העוזר החכם שלך. במה אוכל לעזור לך היום? 😊</div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="הקלד הודעה כאן..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">שלח</button>
    </div>

    <!-- פאנל ניהול סודי -->
    <div id="admin-panel" id="admin-panel">
        <h3>🔑 הגדרות מפתח סודיות</h3>
        <label for="api-key-input">מפתח Groq API:</label>
        <input type="text" id="api-key-input" placeholder="הדבק כאן את מפתח ה-gsk_">
        <button onclick="saveApiKey()">שמור מפתח בדפדפן</button>
        <button id="close-admin" onclick="toggleAdminPanel()">סגור פאנל</button>
    </div>

    <script>
        // בדיקה אם קיים מפתח שמור בדפדפן בטעינה הראשונה
        let apiKey = localStorage.getItem("groq_api_key") || "";

        // פתיחת פאנל סודי בלחיצה כפולה על הכותרת
        document.getElementById("header-title").addEventListener("dblclick", () => {
            const password = prompt("הכנס סיסמת מנהל סודית:");
            if (password === "1234") {
                toggleAdminPanel();
                if(apiKey) {
                    document.getElementById("api-key-input").value = apiKey;
                }
            } else if (password !== null) {
                alert("סיסמה שגויה!");
            }
        });

        function toggleAdminPanel() {
            const panel = document.getElementById("admin-panel");
            panel.style.display = panel.style.display === "block" ? "none" : "block";
        }

        function saveApiKey() {
            const keyInput = document.getElementById("api-key-input").value.trim();
            if (keyInput) {
                localStorage.setItem("groq_api_key", keyInput);
                apiKey = keyInput;
                alert("המפתח נשמר בהצלחה בדפדפן זה! האתר מוכן לפעולה.");
                toggleAdminPanel();
            } else {
                alert("נא להזין מפתח תקין.");
            }
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        async function sendMessage() {
            const inputElement = document.getElementById("user-input");
            const userMessage = inputElement.value.trim();
            
            if (!userMessage) return;

            // בדיקה אם המפתח קיים
            if (!apiKey) {
                alert("המפתח לא מוגדר! אנא בצע לחיצה כפולה על כותרת האתר, הקש סיסמה 1234 והגדר מפתח API.");
                return;
            }

            // הצגת הודעת המשתמש במסך
            appendMessage(userMessage, "user");
            inputElement.value = "";

            // הצגת הודעת טעינה זמנית מה-AI
            const loadingId = appendMessage("חושב... ⚡", "bot");

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { 
                                role: "system", 
                                content: "אתה עוזר בינה מלאכותית חכם, מנומס ובטוח באתר הצ'אט של דן. חוקים נוקשים שאתה חייב לציית להם: 1. אל תעזור בשום אופן לפרוץ למחשבים, חשבונות, אתרים או משתמשים (כמו רובלוקס, אינסטגרם וכו'). אם מבקשים ממך קוד פריצה או עזרה בפריצה, סרב בנימוס ואמור שאתה לא תומך בפעילויות לא חוקיות. 2. אל תשתף פעולה עם קללות, בריונות, תוכן פוגעני או פגיעה באחרים. 3. ענה תמיד בעברית ברורה, זורמת וידידותית." 
                            },
                            { role: "user", content: userMessage }
                        ]
                    })
                });

                const data = await response.json();
                
                // הסרת הודעת הטעינה
                document.getElementById(loadingId).remove();

                if (response.ok) {
                    const botReply = data.choices[0].message.content;
                    appendMessage(botReply, "bot");
                } else {
                    // טיפול בשגיאות שמגיעות מ-Groq
                    const errorMsg = data.error ? data.error.message : "שגיאה לא ידועה";
                    appendMessage(`❌ שגיאה מ-Groq: ${errorMsg}`, "error");
                }

            } catch (error) {
                document.getElementById(loadingId).remove();
                appendMessage("❌ שגיאת תקשורת. ודא שאתה מחובר לאינטרנט ושהמפתח שהזנת תקין.", "error");
                console.error(error);
            }
        }

        function appendMessage(text, fontClass) {
            const chatContainer = document.getElementById("chat-container");
            const messageElement = document.createElement("div");
            const id = "msg-" + Date.now() + Math.random().toString(36).substr(2, 4);
            
            messageElement.id = id;
            messageElement.className = `message ${fontClass}`;
            messageElement.innerText = text;
            
            chatContainer.appendChild(messageElement);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return id;
        }
    </script>
</body>
</html>
