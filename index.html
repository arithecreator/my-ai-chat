<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBot</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --chat-bg: #212121;
            --sidebar-bg: #171717;
            --text-color: #ececec;
            --user-msg: #343541;
            --bot-msg: #212121;
            --accent-color: #4caf50;
            --btn-hover: #3e3f4b;
            --icon-color: #acacbe;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* סרגל צד - היסטוריית שיחות */
        #sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            padding: 10px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #333;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        #new-chat-btn {
            background-color: transparent;
            color: white;
            border: 1px solid #444;
            border-radius: 5px;
            padding: 12px;
            text-align: right;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            transition: background 0.2s;
        }

        #new-chat-btn:hover {
            background-color: var(--btn-hover);
        }

        #history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .history-item {
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.9rem;
            color: #ccc;
            transition: background 0.2s, color 0.2s;
        }

        .history-item:hover, .history-item.active {
            background-color: var(--btn-hover);
            color: white;
        }

        /* אזור הצ'אט הראשי */
        #main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--chat-bg);
            position: relative;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #333;
            cursor: pointer;
            user-select: none;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message-row {
            display: flex;
            padding: 20px 15px;
            gap: 15px;
            width: 100%;
            box-sizing: border-box;
            border-bottom: 1px solid #333;
            position: relative;
        }

        .message-row.user {
            background-color: var(--user-msg);
        }

        .message-row.bot {
            background-color: var(--bot-msg);
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .message-row.user .avatar {
            background-color: transparent;
            color: white;
        }

        .message-row.bot .avatar {
            background-color: var(--accent-color);
            color: white;
            font-size: 1rem;
        }

        .message-content {
            flex: 1;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        /* כפתורי פעולה על הודעות (העתקה, עריכה) */
        .message-actions {
            display: none;
            position: absolute;
            left: 10px;
            bottom: 5px;
            gap: 5px;
            background-color: rgba(33, 33, 33, 0.9);
            padding: 3px;
            border-radius: 5px;
        }

        .message-row:hover .message-actions {
            display: flex;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--icon-color);
            cursor: pointer;
            padding: 3px;
            font-size: 0.8rem;
            border-radius: 3px;
        }

        .action-btn:hover {
            color: white;
            background-color: #444;
        }

        /* אנימציית טעינה (4 נקודות) */
        .dots-loader {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 10px 0;
        }

        .dots-loader span {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
            animation: dots-flash 1.4s infinite ease-in-out both;
        }

        .dots-loader span:nth-child(1) { animation-delay: -0.32s; }
        .dots-loader span:nth-child(2) { animation-delay: -0.16s; }
        .dots-loader span:nth-child(3) { animation-delay: -0.08s; }

        @keyframes dots-flash {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1.0); opacity: 1; }
        }

        /* אזור הקלט */
        #input-container {
            background-color: transparent;
            padding: 20px 15px;
            display: flex;
            justify-content: center;
            position: absolute;
            bottom: 0;
            width: 100%;
            box-sizing: border-box;
        }
        
        #input-wrapper {
            width: 80%;
            background-color: #40414f;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            padding: 5px 10px;
            gap: 10px;
        }

        textarea {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: transparent;
            color: white;
            font-size: 1rem;
            outline: none;
            resize: none;
            max-height: 150px;
            font-family: inherit;
        }

        #send-btn {
            background-color: transparent;
            color: var(--icon-color);
            border: none;
            padding: 10px;
            cursor: pointer;
            transition: color 0.2s;
        }

        #send-btn:hover:not(:disabled) {
            color: var(--accent-color);
            background-color: #555;
            border-radius: 5px;
        }
        
        #send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* פאנל ניהול סודי */
        #admin-panel {
            display: none;
            position: fixed;
            top: 0;
            right: 260px;
            width: 320px;
            height: 100vh;
            background-color: #222;
            border-left: 2px solid #444;
            box-shadow: -5px 0 25px rgba(0,0,0,0.7);
            padding: 25px;
            box-sizing: border-box;
            z-index: 1000;
            overflow-y: auto;
        }
        
        #admin-panel h3 { margin-top: 0; border-bottom: 2px solid #444; padding-bottom: 10px; color: var(--accent-color); }
        .admin-group { margin-bottom: 20px; }
        .admin-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #ccc; }
        #admin-panel input { width: 100%; border-radius: 8px; padding: 10px; background-color: #333; border: 1px solid #555; color: white; box-sizing: border-box; }
        .admin-btn { width: 100%; background-color: var(--accent-color); border-radius: 8px; margin-top: 5px; color: white; font-weight: bold; padding: 10px; border: none; cursor: pointer;}
        #close-admin { background-color: #555 !important; margin-top: 15px; }

    </style>
</head>
<body>

    <div id="sidebar">
        <button id="new-chat-btn" onclick="startNewChat()">
            שיחה חדשה <span>+</span>
        </button>
        <div id="history-list">
            </div>
