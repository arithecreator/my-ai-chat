<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SmartBot Pro 🚀</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #1a1a1a; --chat-bg: #212121; --accent: #4caf50; --error: #ff4a4a; }
        body { font-family: sans-serif; background-color: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 260px; background: #171717; padding: 15px; border-left: 1px solid #333; }
        #main-chat { flex: 1; display: flex; flex-direction: column; background: var(--chat-bg); }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; }
        .message-row { padding: 15px; border-bottom: 1px solid #333; position: relative; }
        .message-row:hover .actions { display: flex; }
        .actions { display: none; position: absolute; left: 20px; top: 10px; gap: 10px; }
        .media-output { max-width: 400px; display: block; margin-top: 10px; border-radius: 8px; }
        #input-container { padding: 20px; background: #212121; display: flex; gap: 10px; }
        textarea { flex: 1; background: #40414f; border: none; color: white; padding: 10px; border-radius: 8px; }
        #admin-panel { display: none; position: fixed; top: 20%; left: 30%; background: #333; padding: 20px; z-index: 100; border-radius: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <button onclick="startNewChat()">+ שיחה חדשה</button>
    <div id="history"></div>
</div>

<div id="main-chat">
    <header id="header" ondblclick="toggleAdmin()">SmartBot Pro 🚀</header>
    <div id="chat-container"></div>
    <div id="input-container">
        <textarea id="user-input" placeholder="שלח הודעה או בקש מדיה..."></textarea>
        <button onclick="sendMessage()">שלח</button>
    </div>
</div>

<div id="admin-panel">
    <h3>ניהול מערכת</h3>
    <input type="text" id="api-key-input" placeholder="Groq API Key">
    <button onclick="saveSettings()">שמור</button>
    <button onclick="toggleAdmin()">סגור</button>
</div>

<script>
    const firebaseConfig = { /* הכנס נתונים */ };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let apiKey = ""; // יטען מה-Firebase

    // --- מערכת הודעות ומדיה ---
    async function sendMessage() {
        const input = document.getElementById("user-input");
        let text = input.value.trim();
        if(!text) return;
        
        appendMessageRow(text, "user");
        input.value = "";

        const isMusic = /מוזיקה|שיר|תלחין/.test(text);
        const isVideo = /סרטון|וידאו|סרט/.test(text);
        const isImage = /תמונה|צייר|תצייר|תיצור|תייצר/.test(text);

        if (isMusic || isVideo || isImage) {
            const prompt = text.replace(/(תמונה|צייר|תצייר|תיצור|תייצר|סרטון|וידאו|סרט|מוזיקה|שיר|תלחין|לי|את|בשביל)/gi, "").trim();
            const enc = encodeURIComponent(prompt || "art");
            const url = isMusic ? `https://pollinations.ai/music/${enc}` : 
                        isVideo ? `https://image.pollinations.ai/p/${enc}?model=turbo` : 
                        `https://image.pollinations.ai/p/${enc}?nologo=true`;
            
            appendMessageRow(`הנה ה-${isMusic ? "מוזיקה" : isVideo ? "סרטון" : "תמונה"} שלך:`, "assistant", isMusic ? "music" : (isVideo ? "video" : "image"), url);
        } else {
            // קריאה ל-Groq
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {"Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json"},
                body: JSON.stringify({model: "llama-3.3-70b-versatile", messages: [{role: "user", content: text}]})
            });
            const data = await res.json();
            appendMessageRow(data.choices[0].message.content, "assistant");
        }
    }

    function appendMessageRow(text, role, type=null, url=null) {
        const chat = document.getElementById("chat-container");
        const div = document.createElement("div");
        div.className = `message-row ${role}`;
        div.innerHTML = `<div>${text}</div> 
                         <div class="actions">
                            <button onclick="editMsg(this)">📝</button>
                            <button onclick="this.parentElement.parentElement.remove()">🗑️</button>
                         </div>`;
        if(type === "image" || type === "video") div.innerHTML += `<img src="${url}" class="media-output">`;
        if(type === "music") div.innerHTML += `<audio controls src="${url}"></audio>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function toggleAdmin() {
        const p = document.getElementById("admin-panel");
        p.style.display = p.style.display === "block" ? "none" : "block";
    }

    function saveSettings() {
        apiKey = document.getElementById("api-key-input").value;
        toggleAdmin();
        alert("נשמר!");
    }

    function startNewChat() { document.getElementById("chat-container").innerHTML = ""; }
    function editMsg(btn) { 
        const txt = btn.parentElement.parentElement.innerText;
        document.getElementById("user-input").value = txt; 
    }
</script>
</body>
</html>
